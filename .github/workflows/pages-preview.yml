name: Pages Preview

on:
  push:
    branches-ignore:
      - gh-pages
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-preview
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy Wasm preview
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Yarn
        run: |
          npm install -g yarn
          yarn --version

      - name: Install WASM dependencies
        run: |
          if [ -f "kotlin-js-store/wasm/yarn.lock" ]; then
            cd kotlin-js-store/wasm
            yarn install --frozen-lockfile
            cd ../..
          fi

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-home-cache-cleanup: true

      - name: Build Wasm distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --stacktrace

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./composeApp/build/dist/wasmJs/productionExecutable
          force_orphan: true
          enable_jekyll: false
          commit_message: "docs: update Pages preview from ${{ github.sha }}"
